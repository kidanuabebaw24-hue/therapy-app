<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Theraphy API Tester</title>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; padding: 40px; background: #f4f7f6; color: #333; }
        .card { background: white; padding: 30px; border-radius: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); max-width: 500px; margin: 0 auto; }
        h1 { color: #2c3e50; font-size: 24px; margin-bottom: 20px; text-align: center; }
        .form-group { margin-bottom: 15px; }
        label { display: block; margin-bottom: 5px; font-weight: 600; font-size: 14px; }
        input { width: 100%; padding: 10px; border: 1px solid #ddd; border-radius: 6px; box-sizing: border-box; }
        button { width: 100%; padding: 12px; background: #3498db; color: white; border: none; border-radius: 6px; font-size: 16px; font-weight: 600; cursor: pointer; transition: background 0.2s; }
        button:hover { background: #2980b9; }
        pre { background: #2c3e50; color: #ecf0f1; padding: 15px; border-radius: 6px; overflow-x: auto; font-size: 13px; margin-top: 20px; min-height: 50px; }
        .success { color: #27ae60; font-weight: bold; }
        .error { color: #e74c3c; font-weight: bold; }
    </style>
</head>
<body>
    <div class="card">
        <h1>🚀 Theraphy API Tester</h1>
        <div class="form-group">
            <label>Full Name</label>
            <input type="text" id="name" value="Test User">
        </div>
        <div class="form-group">
            <label>Email Address</label>
            <input type="email" id="email" value="test_user@example.com">
        </div>
        <div class="form-group">
            <label>Password</label>
            <input type="password" id="password" value="Password123!">
        </div>
        <button id="testBtn">Register Test Account</button>
        <pre id="output">Click the button to test...</pre>
    </div>

    <script>
        document.getElementById('testBtn').onclick = async () => {
            const output = document.getElementById('output');
            const name = document.getElementById('name').value;
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;

            output.textContent = '⏳ Sending request...';
            
            try {
                const response = await fetch('http://localhost:5000/api/auth/register', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ name, email, password, role: 'client' })
                });
                
                const data = await response.json();
                output.textContent = JSON.stringify(data, null, 2);
                
                if (response.ok) {
                    output.classList.add('success');
                    output.classList.remove('error');
                } else {
                    output.classList.add('error');
                    output.classList.remove('success');
                }
            } catch (error) {
                output.textContent = '❌ Error: ' + error.message + '\n\nMake sure your backend is running on port 5000!';
                output.classList.add('error');
            }
        };
    </script>
</body>
</html>
